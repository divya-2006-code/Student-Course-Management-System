<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Course</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#eef2ff;
}

/* Sidebar */

.sidebar{
position:fixed;
left:0;
top:0;
width:260px;
height:100vh;
background:linear-gradient(180deg,#0F172A,#1E40AF);
overflow:auto;
}

.logo{
text-align:center;
padding:25px;
color:white;
border-bottom:1px solid rgba(255,255,255,.2);
}

.logo i{
font-size:55px;
margin-bottom:10px;
}

.logo h3{
font-weight:700;
}

.sidebar ul{
list-style:none;
padding-left:0;
margin-top:20px;
}

.sidebar ul li{
margin:10px 15px;
}

.sidebar ul li a{
display:block;
padding:14px;
color:white;
text-decoration:none;
border-radius:10px;
transition:.3s;
}

.sidebar ul li a:hover{
background:rgba(255,255,255,.15);
padding-left:20px;
}

.active{
background:white;
color:#1E40AF !important;
font-weight:600;
}

/* Main */

.main{
margin-left:260px;
padding:30px;
}

/* Topbar */

.topbar{
background:white;
padding:20px 30px;
border-radius:15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 10px 20px rgba(0,0,0,.08);
margin-bottom:30px;
}

.profile{
font-size:18px;
font-weight:600;
color:#1E40AF;
}

/* Form Card */

.form-card{
background:white;
padding:35px;
border-radius:18px;
box-shadow:0 10px 20px rgba(0,0,0,.08);
}

.form-card h3{
color:#1E40AF;
font-weight:700;
margin-bottom:25px;
}

.form-label{
font-weight:600;
}

.form-control,
.form-select{
height:48px;
border-radius:10px;
}

textarea{
border-radius:10px !important;
}

.btn-save{
background:#1E40AF;
color:white;
padding:12px 35px;
border:none;
border-radius:10px;
font-weight:600;
}

.btn-save:hover{
background:#16359d;
}

.btn-reset{
padding:12px 35px;
border-radius:10px;
font-weight:600;
}

@media(max-width:992px){

.sidebar{
position:relative;
width:100%;
height:auto;
}

.main{
margin-left:0;
}

}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<div class="logo">

<i class="fa-solid fa-book"></i>

<h3>SCMS Admin</h3>

</div>

<ul>

<li><a href="admin-dashboard.html"><i class="fa-solid fa-gauge"></i> Dashboard</a></li>

<li><a href="manage-students.html"><i class="fa-solid fa-users"></i> Manage Students</a></li>

<li><a href="manage-courses.html"><i class="fa-solid fa-book-open"></i> Manage Courses</a></li>

<li><a class="active" href="add-course.html"><i class="fa-solid fa-circle-plus"></i> Add Course</a></li>

<li><a href="../home.html"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>

</ul>

</div>

<!-- Main -->

<div class="main">

<div class="topbar">

<div>

<h2>Add New Course</h2>

<p class="text-muted">
Create a new course for students.
</p>

</div>

<div class="profile">

<i class="fa-solid fa-circle-user"></i>

Admin

</div>

</div>

<div class="form-card">

<h3>

<i class="fa-solid fa-book-medical"></i>

Course Information

</h3>

<form id="courseForm">

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">

Course ID

</label>

<input
type="text"
class="form-control"
id="courseId"
placeholder="Example: C116"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Course Name

</label>

<input
type="text"
class="form-control"
id="courseName"
placeholder="Enter Course Name"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Course Name

</label>

<select

class="form-select"

id="courseName">

<option value="">Select Course</option>

<option>Programming in C</option>

<option>Python Programming</option>

<option>Data Structures</option>

<option>Web Development</option>

<option>Database Management System</option>

<option>Operating Systems</option>

<option>Computer Networks</option>

<option>Machine Learning</option>

<option>Artificial Intelligence</option>

<option>Deep Learning</option>

<option>Cloud Computing</option>

<option>Mobile Application Development</option>

<option>Cyber Security</option>

<option>Network Security</option>

<option>Digital Electronics</option>

<option>VLSI Design</option>

<option>Power Systems</option>

<option>Renewable Energy Systems</option>

<option>Thermodynamics</option>

<option>Robotics Engineering</option>

</select>

</div>
<div class="col-md-6 mb-3">

<label class="form-label">

Instructor

</label>

<input
type="text"
class="form-control"
id="instructor"
placeholder="Instructor Name"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Duration

</label>

<input
type="text"
class="form-control"
id="duration"
placeholder="Example: 8 Weeks"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Course Fee

</label>

<input
type="text"
class="form-control"
id="fee"
placeholder="Example: ₹5,000"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Status

</label>

<select
class="form-select"
id="status">

<option>Active</option>

<option>Inactive</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Course Level

</label>

<select
class="form-select"
id="level">

<option>Beginner</option>

<option>Intermediate</option>

<option>Advanced</option>

</select>

</div>

<div class="col-12 mb-3">

<label class="form-label">

Course Description

</label>

<textarea
class="form-control"
id="description"
rows="5"
placeholder="Enter course description..."></textarea>

</div>

<div class="col-12 text-center mt-3">

<button
type="button"
class="btn btn-save me-3"
onclick="saveCourse()">

<i class="fa-solid fa-floppy-disk"></i>

Save Course

</button>

<button
type="reset"
class="btn btn-outline-secondary btn-reset">

<i class="fa-solid fa-rotate"></i>

Reset

</button>

<a
href="manage-courses.html"
class="btn btn-danger ms-3">

<i class="fa-solid fa-arrow-left"></i>

Back

</a>

</div>

</div>

</form>

</div>

<!-- Footer -->

<footer class="text-center mt-5 mb-3">

<hr>

<p class="text-muted">

© 2026 Student Course Management System | Admin Module

</p>

</footer>

</div>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

// ===============================
// SAVE COURSE
// ===============================

function saveCourse(){

    let courseId = document.getElementById("courseId").value.trim();
    let courseName = document.getElementById("courseName").value.trim();
    let category = document.getElementById("category").value;
    let instructor = document.getElementById("instructor").value.trim();
    let duration = document.getElementById("duration").value.trim();
    let fee = document.getElementById("fee").value.trim();
    let status = document.getElementById("status").value;
    let level = document.getElementById("level").value;
    let description = document.getElementById("description").value.trim();

    if(courseId=="" ||
       courseName=="" ||
       category=="" ||
       instructor=="" ||
       duration=="" ||
       fee=="" ||
       description==""){

        alert("Please fill all required fields.");

        return;

    }

    alert(

"Course Added Successfully!\n\n" +

"Course ID : " + courseId +

"\nCourse : " + courseName +

"\nCategory : " + category +

"\nInstructor : " + instructor +

"\nDuration : " + duration +

"\nFee : " + fee +

"\nStatus : " + status +

"\nLevel : " + level

);

    document.getElementById("courseForm").reset();

}

// ===============================
// LOGOUT CONFIRMATION
// ===============================

let logout=document.querySelector("a[href='../home.html']");

if(logout){

logout.onclick=function(e){

if(!confirm("Are you sure you want to logout?")){

e.preventDefault();

}

};

}

// ===============================
// PAGE LOADED
// ===============================

window.onload=function(){

console.log("Add Course Page Loaded Successfully.");

}

</script>

</body>

</html>
