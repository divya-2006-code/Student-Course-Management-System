<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="login-container">

<div class="container">

<div class="row justify-content-center align-items-center min-vh-100">

<div class="col-lg-5 col-md-7">

<div class="login-card">

<div class="text-center mb-4">

<i class="fa-solid fa-user-graduate login-icon"></i>

<h2 class="mt-3">Student Login</h2>

<p class="text-muted">

Login to access your courses and learning dashboard.

</p>

</div>

<form id="studentLoginForm">

<div class="mb-3">

<label class="form-label">

Email Address

</label>

<div class="input-group">

<span class="input-group-text">

<i class="fa-solid fa-envelope"></i>

</span>

<input
type="email"
class="form-control"
id="email"
placeholder="Enter your Email"
required>

</div>

</div>

<div class="mb-3">

<label class="form-label">

Password

</label>

<div class="input-group">

<span class="input-group-text">

<i class="fa-solid fa-lock"></i>

</span>

<input
type="password"
class="form-control"
id="password"
placeholder="Enter your Password"
required>

</div>

</div>
<div class="d-flex justify-content-between align-items-center mb-4">

<div class="form-check">

<input
class="form-check-input"
type="checkbox"
id="rememberMe">

<label class="form-check-label" for="rememberMe">

Remember Me

</label>

</div>

<a href="forgot-password.html" class="forgot-link">

Forgot Password?

</a>

</div>

<div class="d-grid mb-3">

<button
type="submit"
class="btn btn-primary btn-login">

<i class="fa-solid fa-right-to-bracket"></i>

Login

</button>

</div>

<div class="text-center mb-3">

<p>

Don't have an account?

<a href="register.html">

Register Here

</a>

</p>

</div>

<div class="text-center">

<a href="../home.html" class="btn btn-outline-secondary">

<i class="fa-solid fa-house"></i>

Back to Home

</a>

</div>

</form>

</div>

</div>

</div>

</div>

</div>

<!-- Footer -->

<footer class="login-footer">

<div class="container text-center">

<p>

© 2026 Student Course Management and Learning Progress Tracking System

</p>

</div>

</footer>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- External JavaScript -->

<script src="../js/script.js"></script>

</body>

</html>
