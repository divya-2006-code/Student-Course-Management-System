<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<div class="register-container">

<div class="container">

<div class="row justify-content-center align-items-center min-vh-100">

<div class="col-lg-7 col-md-9">

<div class="register-card">

<div class="text-center mb-4">

<i class="fa-solid fa-user-plus register-icon"></i>

<h2 class="mt-3">

Student Registration

</h2>

<p class="text-muted">

Create your account to access courses and learning resources.

</p>

</div>

<form id="registerForm">

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">

Full Name

</label>

<div class="input-group">

<span class="input-group-text">

<i class="fa-solid fa-user"></i>

</span>

<input
type="text"
class="form-control"
id="fullName"
placeholder="Enter Full Name"
required>

</div>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Register Number

</label>

<div class="input-group">

<span class="input-group-text">

<i class="fa-solid fa-id-card"></i>

</span>

<input
type="text"
class="form-control"
id="registerNo"
placeholder="Enter Register Number"
required>

</div>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Email Address

</label>

<div class="input-group">

<span class="input-group-text">

<i class="fa-solid fa-envelope"></i>

</span>

<input
type="email"
class="form-control"
id="email"
placeholder="Enter Email Address"
required>

</div>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Phone Number

</label>

<div class="input-group">

<span class="input-group-text">

<i class="fa-solid fa-phone"></i>

</span>

<input
type="tel"
class="form-control"
id="phone"
placeholder="Enter Phone Number"
required>

</div>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Department

</label>

<select class="form-select" id="department" required>

<option value="">Select Department</option>

<option>Computer Science and Engineering</option>

<option>Information Technology</option>

<option>Electronics and Communication Engineering</option>

<option>Electrical and Electronics Engineering</option>

<option>Mechanical Engineering</option>

<option>Civil Engineering</option>

<option>Artificial Intelligence and Data Science</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Academic Year

</label>

<select class="form-select" id="year" required>

<option value="">Select Year</option>

<option>I Year</option>

<option>II Year</option>

<option>III Year</option>

<option>IV Year</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Semester

</label>

<select class="form-select" id="semester" required>

<option value="">Select Semester</option>

<option>Semester I</option>

<option>Semester II</option>

<option>Semester III</option>

<option>Semester IV</option>

<option>Semester V</option>

<option>Semester VI</option>

<option>Semester VII</option>

<option>Semester VIII</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Date of Birth

</label>

<input
type="date"
class="form-control"
id="dob"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Gender

</label>

<select class="form-select" id="gender" required>

<option value="">Select Gender</option>

<option>Male</option>

<option>Female</option>

<option>Other</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Password

</label>

<div class="input-group">

<span class="input-group-text">

<i class="fa-solid fa-lock"></i>

</span>

<input
type="password"
class="form-control"
id="password"
placeholder="Create Password"
required>

</div>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Confirm Password

</label>

<div class="input-group">

<span class="input-group-text">

<i class="fa-solid fa-lock"></i>

</span>

<input
type="password"
class="form-control"
id="confirmPassword"
placeholder="Confirm Password"
required>

</div>

</div>

<div class="col-12 mt-3">

<div class="d-grid gap-2">

<button
type="submit"
class="btn btn-primary btn-register">

<i class="fa-solid fa-user-plus"></i>

Register

</button>

<button
type="reset"
class="btn btn-outline-secondary">

<i class="fa-solid fa-rotate-left"></i>

Reset

</button>

</div>

</div>

</div>

<div class="text-center mt-4">

<p>

Already have an account?

<a href="student-login.html">

Login Here

</a>

</p>

</div>

<div class="text-center mt-3">

<a href="../home.html" class="btn btn-outline-dark">

<i class="fa-solid fa-house"></i>

Back to Home

</a>

</div>

</form>

</div>

</div>

</div>

</div>

</div>

<!-- Footer -->

<footer class="login-footer">

<div class="container text-center">

<p>

© 2026 Student Course Management and Learning Progress Tracking System

</p>


</div>

</footer>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- External JavaScript -->

<script src="../js/script.js"></script>

</body>

</html>
